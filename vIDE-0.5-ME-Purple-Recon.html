<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>vIDE Recon ME (0.5)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg: #000000;
  --sidebar: #151515;
  --border: #1f1f1f;
  --text: #ffffff;
  --muted: #8a8a8a;
  --active: #1c1c1c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  display: flex;
  flex-direction: column;
}

header {
  height: 55px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

main {
  flex: 1;
  display: flex;
}

#fileList {
  width: 500px;
  background: var(--sidebar);
  border-right: 8px solid var(--border);
  padding: 40px;
}

.file {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 18px;
  color: var(--muted);
  cursor: pointer;
}

.file.active {
  background: var(--active);
  color: var(--text);
}

#editor {
  flex: 1;
  background: transparent;
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  padding: 14px;
  font-family: monospace;
  font-size: 16px;
  line-height: 1.4;
}

button {
  background: #1a1a1a;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 18 px;
  cursor: pointer;
}

footer {
  height: 30px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  font-size: 14px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}
</style>
</head>

<body>

<header>
  <strong>vIDE</strong>
  <div>
    <button onclick="newFile()">+ File</button>
    <button onclick="downloadFile()">Download</button>
  </div>
</header>

<main>
  <div id="fileList"></div>
  <textarea id="editor" spellcheck="false"></textarea>
</main>

<footer>
  vIDE 0.5 Midnight Edition (Purple Recon)
</footer>

<script>
const STORAGE_KEY = "vIDE_simple_project";

let project = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
  files: [{ name: "placeholder.txt", content: " " }],
  active: 0
};

const fileList = document.getElementById("fileList");
const editor = document.getElementById("editor");

function save() {
  project.files[project.active].content = editor.value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
}

function renderFiles() {
  fileList.innerHTML = "";
  project.files.forEach((file, index) => {
    const div = document.createElement("div");
    div.className = "file" + (index === project.active ? " active" : "");
    div.textContent = file.name;
    div.onclick = () => loadFile(index);
    fileList.appendChild(div);
  });
}

function loadFile(index) {
  save();
  project.active = index;
  editor.value = project.files[index].content;
  renderFiles();
}

function newFile() {
  const name = prompt("File name:");
  if (!name) return;
  project.files.push({ name, content: "" });
  project.active = project.files.length - 1;
  save();
  loadFile(project.active);
}

function downloadFile() {
  const file = project.files[project.active];
  const blob = new Blob([file.content], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = file.name;
  link.click();
}

editor.addEventListener("input", save);

renderFiles();
loadFile(project.active);
</script>

</body>
</html>
